<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>현장 부품 검수</title>
<style>
  :root {
    --green: #1d9e75; --green-bg: #e1f5ee;
    --amber: #ba7517; --amber-bg: #faeeda;
    --red: #e24b4a; --red-bg: #fcebeb;
    --gray: #5f5e5a; --gray-bg: #f1efe8;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --line: rgba(0,0,0,0.12);
    --txt: #2c2c2a; --txt2: #5f5e5a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    margin: 0; background: #fafafa; color: var(--txt);
    font-size: 16px; line-height: 1.5;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 0 14px 90px; }
  header {
    position: sticky; top: 0; z-index: 50; background: #fff;
    border-bottom: 1px solid var(--line); padding: 12px 14px;
    margin: 0 -14px 14px; text-align: center;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--txt2); margin-top: 2px; }

  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; margin-bottom: 12px;
  }
  .card h2 { font-size: 14px; margin: 0 0 10px; font-weight: 600; color: var(--txt2); }

  textarea {
    width: 100%; min-height: 240px; border: 1px solid var(--line);
    border-radius: 8px; padding: 10px; font-size: 15px; font-family: inherit;
    resize: vertical;
  }
  .hint { font-size: 12px; color: var(--txt2); margin: 6px 0 0; }

  button {
    border: none; border-radius: 10px; padding: 13px 16px; font-size: 16px;
    font-weight: 600; font-family: inherit; cursor: pointer; width: 100%;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-dark { background: #2c2c2a; color: #fff; }
  .btn-ghost { background: var(--gray-bg); color: var(--txt); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; }
  button:active { opacity: 0.85; }

  /* 진행 요약 */
  .summary { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 6px; text-align: center;
  }
  .stat .n { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .stat .l { font-size: 11px; color: var(--txt2); margin-top: 2px; }
  .stat.done .n { color: var(--green); }
  .stat.left .n { color: var(--amber); }
  .stat.wrong .n { color: var(--red); }

  /* 스캐너 */
  #scanArea { display: none; }
  #reader { width: 100%; }
  #reader video { border-radius: 12px !important; }
  .last-scan {
    text-align: center; padding: 10px; font-size: 14px; font-weight: 600;
    border-radius: 8px; margin-top: 10px; min-height: 20px; white-space: pre-line;
  }

  /* 인식 성공/주의 시 화면 전체 번쩍임 */
  #flashOverlay {
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    opacity: 0; background: var(--green);
  }
  #flashOverlay.show-ok { animation: flashOk 0.35s ease-out; }
  #flashOverlay.show-warn { animation: flashWarn 0.45s ease-out; }
  @keyframes flashOk { 0%{opacity:0} 25%{opacity:0.45} 100%{opacity:0} }
  @keyframes flashWarn { 0%{opacity:0} 25%{opacity:0.5} 100%{opacity:0} }

  /* 목록 */
  .item {
    display: flex; align-items: center; gap: 10px; padding: 12px 12px;
    border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px;
    background: #fff; flex-wrap: wrap;
  }
  .item.s-done { background: var(--green-bg); border-color: var(--green); }
  .item.s-partial { background: var(--amber-bg); border-color: var(--amber); }
  .item .pn { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; min-width: 120px; }
  .item .pn small { display: block; font-size: 11px; font-weight: 400; color: var(--txt2); letter-spacing: 0; margin-top: 1px; }
  .item .cnt {
    font-size: 15px; font-weight: 700; min-width: 56px; text-align: right;
  }
  .item.s-done .cnt { color: var(--green); }
  .item.s-partial .cnt { color: var(--amber); }
  .item .chk { font-size: 20px; min-width: 24px; text-align: center; }
  .qty-ctrl {
    display: flex; gap: 6px; width: 100%; margin-top: 8px;
    padding-top: 8px; border-top: 1px dashed var(--line);
  }
  .qbtn {
    flex: 1; padding: 9px 0; font-size: 17px; font-weight: 700;
    border: 1px solid var(--line); border-radius: 8px; background: #fff;
    color: var(--txt); cursor: pointer; font-family: inherit;
  }
  .qbtn:active { background: var(--gray-bg); }
  .qbtn.qall { font-size: 14px; background: var(--blue-bg); color: var(--blue); border-color: var(--blue); flex: 1.4; }

  .manual-row { display: flex; gap: 8px; margin-top: 4px; }
  .manual-row input {
    flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 11px;
    font-size: 15px; font-family: inherit;
  }
  .manual-row button { width: auto; padding: 11px 16px; }

  /* 잘못 온 것 */
  .wrong-box { background: var(--red-bg); border-color: var(--red); }
  .wrong-box .wpn { font-weight: 600; color: var(--red); }

  .fab {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 28px); max-width: 492px; z-index: 60;
  }
  .empty { text-align: center; color: var(--txt2); font-size: 14px; padding: 20px 0; }
  .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--blue-bg); color:var(--blue); margin-left:6px; }
</style>
</head>
<body>
<div id="flashOverlay"></div>
<div class="wrap">
  <header>
    <h1>현장 부품 검수</h1>
    <div class="sub" id="hdrSub">발주 목록을 붙여넣고 시작하세요</div>
  </header>

  <!-- STEP 1: 목록 입력 -->
  <div id="setupArea">
    <div class="card">
      <h2>발주 목록 붙여넣기</h2>
      <textarea id="pasteInput" placeholder="예시 (한 줄에 하나씩):
35170 22600  3
87620 JIA0NCM  1
51750 2P000  2

※ 품번과 수량을 칸/탭으로 구분. 수량 없으면 1로 처리됩니다."></textarea>
      <p class="hint">엑셀·시트에서 품번/수량 두 칸을 복사해 붙여넣어도 됩니다.</p>
      <button class="btn-primary" style="margin-top:10px" onclick="loadList()">목록 불러오기</button>
    </div>
  </div>

  <!-- STEP 2: 검수 -->
  <div id="checkArea" style="display:none">
    <div class="summary">
      <div class="stat done"><div class="n" id="stDone">0</div><div class="l">완료</div></div>
      <div class="stat left"><div class="n" id="stLeft">0</div><div class="l">남음</div></div>
      <div class="stat wrong"><div class="n" id="stWrong">0</div><div class="l">잘못 옴</div></div>
    </div>

    <div class="card" id="scanCard">
      <div class="btn-row">
        <button class="btn-dark" id="scanToggle" onclick="toggleScan()">📷 실시간 스캔</button>
        <button class="btn-dark" id="photoBtn" onclick="document.getElementById('photoInput').click()">📸 사진으로 스캔</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="scanFromPhoto(event)">
      <p class="hint" style="margin-top:8px">실시간이 잘 안 잡히면 <b>사진으로 스캔</b>이 더 정확합니다. 바코드가 또렷하게 나오게 찍으세요.</p>
      <div id="scanArea">
        <div id="reader" style="margin-top:10px; width:100%; border-radius:12px; overflow:hidden;"></div>
        <div class="last-scan" id="lastScan">라벨 바코드를 비춰주세요</div>
      </div>
      <div class="manual-row">
        <input id="manualInput" placeholder="바코드 안 되면 품번 직접 입력" inputmode="text" autocomplete="off">
        <button class="btn-ghost" onclick="manualEnter()">확인</button>
      </div>
    </div>

    <div class="card">
      <h2>검수 목록</h2>
      <div id="itemList"></div>
    </div>

    <div id="wrongArea"></div>

    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn-ghost" onclick="resetAll()">처음부터</button>
      <button class="btn-ghost" onclick="copyResult()">결과 복사</button>
    </div>
  </div>
</div>

<script>
// html5-qrcode 로딩 (CDN 실패 대비 다중 소스)
window.__scanLibReady = false;
window.__scanLibFailed = false;
function loadScanLib(srcs, idx) {
  idx = idx || 0;
  if (idx >= srcs.length) {
    window.__scanLibFailed = true;
    var el = document.getElementById("lastScan");
    if (el) { el.textContent = "⚠️ 스캔 라이브러리를 불러오지 못했습니다. 새로고침하세요."; el.style.color="#e24b4a"; }
    return;
  }
  var s = document.createElement("script");
  s.src = srcs[idx];
  s.onload = function(){ window.__scanLibReady = true; };
  s.onerror = function(){ loadScanLib(srcs, idx+1); };
  document.head.appendChild(s);
}
loadScanLib([
  "https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js",
  "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"
]);
</script>
<script>
// ===== 상태 =====
let items = [];        // {raw, base, suffix, need, got}
let wrongScans = {};   // {scannedPn: count}
let codeReader = null;
let scanning = false;
let lastCode = "";
let lastTime = 0;

// ===== 품번 정규화 =====
// 바코드값/입력값에서 품번 추출: 공백 앞부분 + 대문자화 + 내부공백 제거
function normalizePart(raw) {
  if (!raw) return "";
  let s = String(raw).trim().toUpperCase();
  // 바코드는 "3517022600        0001" 처럼 공백 뒤 꼬리표가 붙음 → 첫 공백 덩어리 앞만
  // 단, 발주목록은 "35170 22600" 처럼 품번 중간 공백이 있을 수 있어 분리 처리
  return s;
}

// 비교용 키: 모든 공백 제거 + 대문자
function compareKey(raw) {
  return String(raw).toUpperCase().replace(/\s+/g, "");
}

// 바코드 원시값에서 품번부분만 분리 (꼬리표 제거)
// 규칙: 연속 2칸 이상 공백 또는 탭이 나오면 그 앞까지가 품번
function extractFromBarcode(raw) {
  let s = String(raw).trim();
  // 연속 공백(2개 이상)으로 분리되는 경우 앞부분만
  let m = s.split(/\s{2,}|\t+/);
  let head = m[0].trim();
  return head;
}

// ===== 목록 불러오기 =====
function loadList() {
  let txt = document.getElementById("pasteInput").value.trim();
  if (!txt) { alert("발주 목록을 붙여넣어 주세요."); return; }
  items = [];
  wrongScans = {};
  let lines = txt.split(/\r?\n/);
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    // 끝에 붙은 수량(숫자) 분리: 마지막 토큰이 순수 숫자면 수량
    let parts = line.split(/[\t]+|\s{2,}/).map(s=>s.trim()).filter(Boolean);
    let qty = 1, pn = line;
    if (parts.length >= 2 && /^\d+$/.test(parts[parts.length-1])) {
      qty = parseInt(parts[parts.length-1], 10);
      pn = parts.slice(0, -1).join(" ");
    } else {
      // 단일칸 구분 시도: 마지막 토큰이 숫자면 수량
      let sp = line.split(/\s+/);
      if (sp.length >= 2 && /^\d+$/.test(sp[sp.length-1]) && sp[sp.length-1].length <= 3) {
        qty = parseInt(sp[sp.length-1], 10);
        pn = sp.slice(0, -1).join(" ");
      }
    }
    let key = compareKey(pn);
    if (!key) continue;
    items.push({ raw: pn.trim(), key: key, need: qty, got: 0 });
  }
  if (items.length === 0) { alert("인식된 품번이 없습니다. 형식을 확인해주세요."); return; }
  document.getElementById("setupArea").style.display = "none";
  document.getElementById("checkArea").style.display = "block";
  document.getElementById("hdrSub").textContent = `${items.length}개 품목 검수 중`;
  render();
}

// ===== 스캔 처리 =====
function handleScan(rawValue, source) {
  source = source || "live";  // live(실시간) / photo(사진) / manual(수동입력)
  let now = Date.now();
  // 중복 방지: 같은 코드 2초 내 무시 (연속 인식 엔진 대응). 단 사진/수동은 항상 처리.
  if (source === "live" && rawValue === lastCode && now - lastTime < 2000) return;
  lastCode = rawValue; lastTime = now;

  let head = extractFromBarcode(rawValue);
  let scanKey = compareKey(head);   // 비교용: 공백제거 + 대문자
  if (!scanKey) { render(); return; }

  // ===== 발주 리스트와 대조 (자릿수/체계 무관, 꼬리표 무시) =====
  // 품번은 항상 스캔값 맨 앞에 옴. 뒤에 붙는 꼬리표(EJ, LG02, 공백 등)는 전부 무시.
  // 우선순위: (1)완전일치 (2)발주품번으로 시작=prefix (3)DS만차이 (4)유사(오인식의심) (5)없음
  let exact = null, prefix = null, dsPass = null, near = null, nearDist = 99;

  for (let it of items) {
    let ik = it.key;
    if (ik === scanKey) { exact = it; break; }            // 완전 일치
    // 스캔값이 발주품번으로 시작하면 통과 (꼬리표가 붙어온 경우)
    // 단, 발주품번이 너무 짧으면(오매칭 위험) prefix 매칭 제외 — 5자 이상만
    if (ik.length >= 5 && scanKey.startsWith(ik)) {
      if (!prefix) prefix = it;
      continue;
    }
    // 발주품번 + DS + 꼬리표 형태도 통과 (예: 발주 ABC123 ↔ 스캔 ABC123DS...)
    if (ik.length >= 5 && scanKey.startsWith(ik + "DS")) {
      if (!dsPass) dsPass = it;
      continue;
    }
    if (isDsOnlyDiff(ik, scanKey)) { if (!dsPass) dsPass = it; continue; } // DS만 차이
    // 유사도: (a) 전체 비교  (b) 스캔값 앞부분(발주품번 길이)만 잘라 비교 — 꼬리표 붙은 오인식 대응
    let d = editDistance(ik, scanKey);
    if (d <= 2 && Math.abs(ik.length - scanKey.length) <= 2 && d < nearDist) {
      near = it; nearDist = d;
    }
    // 스캔값이 더 길면(꼬리표 포함 가능) 앞부분만 떼서 한 번 더 비교
    if (scanKey.length > ik.length) {
      let dPre = editDistance(ik, scanKey.slice(0, ik.length));
      if (dPre >= 1 && dPre <= 2 && dPre < nearDist) {
        near = it; nearDist = dPre;
      }
    }
  }

  let matched = exact || prefix || dsPass;

  if (matched) {
    if (matched.got < matched.need) {
      matched.got++;
      let tag = (matched === dsPass) ? "  (DS 예외 통과)" : "";
      flash(`✅ ${matched.raw}${tag}  (${matched.got}/${matched.need})`, "var(--green)", "var(--green-bg)");
      beep(true);
    } else {
      flash(`⚠️ ${matched.raw}  이미 수량 다 채움 (${matched.need}개)`, "var(--amber)", "var(--amber-bg)");
      beep(false);
    }
  } else if (near) {
    // 비슷하지만 정확히 일치하지 않음 → 인식오류 의심, 사람이 라벨 보고 확인
    let wk = "확인필요: 읽은값 " + head + " ↔ 발주 " + near.raw;
    wrongScans[wk] = (wrongScans[wk]||0) + 1;
    flash(`⚠️ 비슷하지만 다름 — 라벨 확인!\n읽은값 ${head}\n발주 ${near.raw}`, "var(--amber)", "var(--amber-bg)");
    beep(false);
  } else {
    // 목록에 없는 코드(QR·관리번호 등) → 완전히 무시.
    // 실시간 스캔 중이면 화면도 건드리지 않고 조용히 넘어감(품번 바코드 잡힐 때까지).
    // 단, 사진/수동 입력은 사용자가 의도적으로 넣은 것이므로 안내만 표시.
    if (source === "manual" || source === "photo") {
      flash(`해당 값은 발주 목록에 없습니다: ${head}`, "var(--txt2)", "var(--gray-bg)");
    }
    // wrongScans에 기록하지 않음 → "잘못 옴" 카운터 안 올라감
    return; // render 불필요 (목록 상태 변화 없음)
  }
  render();
}

// DS 접미사 유무만 차이나는지 검사 (예: ABC123 ↔ ABC123DS)
function isDsOnlyDiff(a, b) {
  if (a === b) return false;
  let longer = a.length >= b.length ? a : b;
  let shorter = a.length >= b.length ? b : a;
  return longer === shorter + "DS";
}

// 편집 거리(Levenshtein) — 인식오류로 몇 글자 틀렸는지 측정
function editDistance(a, b) {
  let m = a.length, n = b.length;
  if (Math.abs(m - n) > 3) return 99; // 길이 차 크면 계산 생략
  let dp = Array.from({length: m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for (let j=0;j<=n;j++) dp[0][j]=j;
  for (let i=1;i<=m;i++){
    for (let j=1;j<=n;j++){
      let cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}

function flash(msg, color, bg) {
  let el = document.getElementById("lastScan");
  el.textContent = msg;
  el.style.color = color;
  el.style.background = bg;
}

// 피드백: 소리 + 진동 (현장에서 확실하게 인지)
let audioCtx = null;
function feedback(type) {
  // type: "ok"(성공) / "warn"(확인필요·중복) 
  beep(type);
  vibrate(type);
}

function beep(type) {
  // 진동 + 화면 번쩍임을 함께 발생 (소리가 작거나 안 들리는 환경 대비)
  vibrate(type);
  screenFlash(type);
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    let now = audioCtx.currentTime;

    if (type === "ok") {
      // 성공: 짧고 높은 "삑" 두 번 살짝 (경쾌하게)
      playTone(1320, now,       0.08, 0.32);   // 높은 톤
      playTone(1760, now+0.09,  0.10, 0.32);   // 더 높은 톤 (상승감)
    } else {
      // 확인필요/중복: 낮고 둔한 톤 한 번 (주의 환기)
      playTone(420, now, 0.22, 0.30);
    }
  } catch(e){}
}

function playTone(freq, startTime, dur, vol) {
  let o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = "square";              // square파가 더 또렷하고 크게 들림
  o.frequency.value = freq;
  // 부드러운 시작/끝 (딱딱한 클릭음 방지)
  g.gain.setValueAtTime(0.0001, startTime);
  g.gain.exponentialRampToValueAtTime(vol, startTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
  o.start(startTime);
  o.stop(startTime + dur + 0.02);
}

function vibrate(type) {
  try {
    if (!navigator.vibrate) return;
    if (type === "ok") navigator.vibrate(45);          // 성공: 짧고 가벼운 한 번 "지직"
    else navigator.vibrate([30, 50, 30, 50, 30]);      // 확인필요: 여러 번 떨어 구분 (주의)
  } catch(e){}
}

function screenFlash(type) {
  try {
    let ov = document.getElementById("flashOverlay");
    if (!ov) return;
    ov.style.background = (type === "ok") ? "var(--green)" : "var(--amber)";
    ov.classList.remove("show-ok", "show-warn");
    void ov.offsetWidth; // 리플로우로 애니메이션 재시작 강제
    ov.classList.add(type === "ok" ? "show-ok" : "show-warn");
  } catch(e){}
}

// ===== 수동 입력 =====
function manualEnter() {
  let v = document.getElementById("manualInput").value.trim();
  if (!v) return;
  handleScan(v, "manual");
  document.getElementById("manualInput").value = "";
}
document.getElementById("manualInput")?.addEventListener("keydown", e=>{
  if (e.key === "Enter") manualEnter();
});

// ===== 카메라 스캔 (html5-qrcode 엔진) =====
let html5qr = null;

async function toggleScan() {
  if (scanning) { stopScan(); return; }

  // 라이브러리 준비 확인
  if (window.__scanLibFailed || typeof Html5Qrcode === "undefined") {
    flash("스캔 라이브러리 로딩 중이거나 실패했습니다. 잠시 후 다시 누르거나 새로고침하세요.", "var(--red)", "var(--red-bg)");
    return;
  }

  document.getElementById("scanArea").style.display = "block";
  document.getElementById("scanToggle").textContent = "■ 스캔 중지";
  scanning = true;
  flash("카메라를 켜는 중…", "var(--blue)", "var(--blue-bg)");

  // ===== 빠른 경로: 브라우저 네이티브 BarcodeDetector 지원 시 직접 사용 =====
  // 갤럭시/크롬 등에서 하드웨어급 속도. 아이폰/사파리 등 미지원이면 자동으로 html5-qrcode로.
  let nativeOk = false;
  try {
    if ("BarcodeDetector" in window) {
      let fmts = await window.BarcodeDetector.getSupportedFormats();
      // 품번은 주로 code_128. 1D 바코드를 하나라도 지원하면 네이티브 사용
      if (fmts && (fmts.includes("code_128") || fmts.includes("code_39") || fmts.includes("ean_13"))) {
        nativeOk = await startNativeScan(fmts);
      }
    }
  } catch (e) { nativeOk = false; }

  if (nativeOk) {
    flash("라벨 바코드를 비춰주세요 (고속 모드)", "var(--txt2)", "transparent");
    return;
  }

  // ===== 폴백 경로: html5-qrcode (모든 브라우저 호환) =====
  try {
    // CODE128 등 1D 바코드 위주로 형식 지정 (인식 속도/정확도 향상)
    let formats = [];
    try {
      const F = Html5QrcodeSupportedFormats;
      formats = [F.CODE_128, F.CODE_39, F.CODE_93, F.EAN_13, F.EAN_8,
                 F.ITF, F.CODABAR, F.UPC_A, F.UPC_E];
    } catch (e) {}

    html5qr = new Html5Qrcode("reader", { formatsToSupport: formats, verbose: false });

    // 긴 CODE128 바코드는 스캔영역(qrbox)을 화면 거의 가득 넓게 잡아야 전체가 담김
    const config = {
      fps: 15,
      qrbox: function(vw, vh) {
        // 가로는 화면의 96%까지 최대한 넓게, 세로는 낮게 (바코드는 가로로 긴 형태)
        let w = Math.floor(vw * 0.96);
        let h = Math.floor(Math.min(vh * 0.45, 160));
        return { width: w, height: h };
      },
      aspectRatio: 1.3333,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      videoConstraints: {
        facingMode: "environment",
        width: { ideal: 1920 }, height: { ideal: 1080 },
        advanced: [{ focusMode: "continuous" }]
      }
    };

    await html5qr.start(
      { facingMode: "environment" },
      config,
      (decodedText, decodedResult) => {
        handleScan(decodedText, "live");
      },
      (errMsg) => { /* 프레임마다 실패는 무시 (정상) */ }
    );

    flash("라벨 바코드를 비춰주세요", "var(--txt2)", "transparent");

  } catch (e) {
    scanning = false;
    document.getElementById("scanArea").style.display = "none";
    document.getElementById("scanToggle").textContent = "📷 실시간 스캔";
    let nm = (e && e.name) ? e.name : "";
    let mg = (e && e.message) ? e.message : String(e);
    let hint = "";
    if (/NotAllowed|Permission/i.test(nm + mg)) hint = " → 주소창 자물쇠에서 카메라 허용 후 새로고침";
    else if (/NotFound/i.test(nm + mg)) hint = " → 카메라를 찾지 못함";
    else if (/NotReadable|in use/i.test(nm + mg)) hint = " → 다른 앱이 카메라 사용 중";
    flash("카메라 오류: " + (nm ? "["+nm+"] " : "") + mg + hint, "var(--red)", "var(--red-bg)");
  }
}

function stopScan() {
  scanning = false;
  // html5-qrcode 정리
  if (html5qr) {
    try {
      html5qr.stop().then(()=>{ try{ html5qr.clear(); }catch(e){} }).catch(()=>{});
    } catch(e){}
  }
  // 네이티브 스캔 정리
  if (nativeStream) {
    try { nativeStream.getTracks().forEach(t=>t.stop()); } catch(e){}
    nativeStream = null;
  }
  let rd = document.getElementById("reader");
  if (rd) rd.innerHTML = "";
  document.getElementById("scanArea").style.display = "none";
  document.getElementById("scanToggle").textContent = "📷 실시간 스캔";
}

// ===== 네이티브 BarcodeDetector 스캔 (지원 브라우저에서 고속) =====
let nativeStream = null;
let nativeVideo = null;
async function startNativeScan(supportedFmts) {
  try {
    // 1D 바코드 위주로 감지기 생성
    let want = ["code_128","code_39","code_93","ean_13","ean_8","itf","codabar","upc_a","upc_e"]
                 .filter(f => supportedFmts.includes(f));
    let detector = new window.BarcodeDetector({ formats: want });

    // 카메라 열기
    nativeStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 }, height: { ideal: 1080 },
        advanced: [{ focusMode: "continuous" }]
      },
      audio: false
    });

    // video 엘리먼트 구성
    let reader = document.getElementById("reader");
    reader.innerHTML = "";
    nativeVideo = document.createElement("video");
    nativeVideo.setAttribute("playsinline", "");
    nativeVideo.muted = true;
    nativeVideo.style.width = "100%";
    nativeVideo.style.borderRadius = "12px";
    reader.appendChild(nativeVideo);
    nativeVideo.srcObject = nativeStream;
    await nativeVideo.play();

    // 연속 초점 적용 시도
    try {
      let track = nativeStream.getVideoTracks()[0];
      let caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.focusMode && caps.focusMode.includes("continuous")) {
        await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
      }
    } catch (e) {}

    // 프레임 검사 루프
    let detecting = false;
    async function tick() {
      if (!scanning || !nativeStream) return;  // 중지되면 루프 종료
      if (!detecting && nativeVideo.readyState >= 2) {
        detecting = true;
        try {
          let codes = await detector.detect(nativeVideo);
          if (codes && codes.length) {
            for (let c of codes) {
              if (c.rawValue) handleScan(c.rawValue, "live");
            }
          }
        } catch (e) { /* 프레임 검출 실패는 무시 */ }
        detecting = false;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    return true;

  } catch (e) {
    // 네이티브 실패 → 스트림 정리하고 false 반환(폴백으로 넘어감)
    if (nativeStream) { try { nativeStream.getTracks().forEach(t=>t.stop()); } catch(_){}; nativeStream = null; }
    return false;
  }
}

// ===== 사진으로 스캔 (정지 이미지 — 실시간보다 정확) =====
async function scanFromPhoto(event) {
  let file = event.target.files && event.target.files[0];
  if (!file) return;
  // 실시간 스캔 중이면 멈춤 (충돌 방지)
  if (scanning) stopScan();

  if (window.__scanLibFailed || typeof Html5Qrcode === "undefined") {
    flash("스캔 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.", "var(--red)", "var(--red-bg)");
    event.target.value = "";
    return;
  }

  document.getElementById("scanArea").style.display = "block";
  flash("사진 분석 중…", "var(--blue)", "var(--blue-bg)");

  // 파일 스캔 전용 인스턴스
  let fileScanner = null;
  try {
    let formats = [];
    try {
      const F = Html5QrcodeSupportedFormats;
      formats = [F.CODE_128, F.CODE_39, F.CODE_93, F.EAN_13, F.EAN_8,
                 F.ITF, F.CODABAR, F.UPC_A, F.UPC_E, F.QR_CODE, F.DATA_MATRIX];
    } catch (e) {}
    fileScanner = new Html5Qrcode("reader", { formatsToSupport: formats, verbose: false });
    let decoded = await fileScanner.scanFile(file, false);
    handleScan(decoded, "photo");
  } catch (e) {
    flash("사진에서 바코드를 찾지 못했습니다. 바코드가 또렷하고 크게 나오게 다시 찍어보세요.", "var(--amber)", "var(--amber-bg)");
  } finally {
    if (fileScanner) { try { fileScanner.clear(); } catch(e){} }
    event.target.value = ""; // 같은 사진 다시 선택 가능하게 초기화
  }
}

// ===== 렌더링 =====
function render() {
  let done = 0, left = 0, wrong = 0;
  let html = "";
  for (let idx = 0; idx < items.length; idx++) {
    let it = items[idx];
    let cls = "", chk = "○";
    if (it.got >= it.need) { cls = "s-done"; chk = "✓"; done++; }
    else if (it.got > 0) { cls = "s-partial"; chk = "◐"; left += (it.need - it.got); }
    else { left += it.need; }

    // 수량 2개 이상인 품목은 +/−/전부 버튼 표시 (묶음 빠른 처리)
    let qtyControls = "";
    if (it.need >= 2) {
      qtyControls = `<div class="qty-ctrl">
        <button class="qbtn" onclick="adjustQty(${idx},-1)" aria-label="감소">−</button>
        <button class="qbtn" onclick="adjustQty(${idx},1)" aria-label="증가">+</button>
        <button class="qbtn qall" onclick="fillAll(${idx})">전부</button>
      </div>`;
    }

    html += `<div class="item ${cls}">
      <div class="chk">${chk}</div>
      <div class="pn">${it.raw}</div>
      <div class="cnt">${it.got} / ${it.need}</div>
      ${qtyControls}
    </div>`;
  }
  document.getElementById("itemList").innerHTML = html || '<div class="empty">품목 없음</div>';

  // 잘못 온 것
  let wkeys = Object.keys(wrongScans);
  let wrongHtml = "";
  if (wkeys.length) {
    wrongHtml = '<div class="card wrong-box"><h2 style="color:var(--red)">⚠️ 목록에 없는 스캔</h2>';
    for (let k of wkeys) {
      wrong += wrongScans[k];
      wrongHtml += `<div class="item wrong-box" style="margin-bottom:6px">
        <div class="wpn">${k}</div>
        <div class="cnt" style="color:var(--red)">${wrongScans[k]}회</div>
        <button class="btn-ghost" style="width:auto;padding:8px 12px;font-size:13px" onclick="clearWrong('${k}')">지움</button>
      </div>`;
    }
    wrongHtml += '</div>';
  }
  document.getElementById("wrongArea").innerHTML = wrongHtml;

  document.getElementById("stDone").textContent = done;
  document.getElementById("stLeft").textContent = left;
  document.getElementById("stWrong").textContent = wrong;
}

function clearWrong(k) { delete wrongScans[k]; render(); }

// 수량 +/− 조절 (묶음 품목)
function adjustQty(idx, delta) {
  let it = items[idx];
  if (!it) return;
  it.got = Math.max(0, Math.min(it.need, it.got + delta));
  if (delta > 0 && it.got <= it.need) { vibrate("ok"); }
  render();
}

// 전부 받음 (묶음 한 번에 채우기)
function fillAll(idx) {
  let it = items[idx];
  if (!it) return;
  it.got = it.need;
  vibrate("ok");
  screenFlash("ok");
  flash(`✅ ${it.raw}  전부 받음 (${it.need}개)`, "var(--green)", "var(--green-bg)");
  render();
}

function resetAll() {
  if (!confirm("처음부터 다시 시작할까요? 현재 검수 기록이 지워집니다.")) return;
  stopScan();
  items = []; wrongScans = {}; lastCode = "";
  document.getElementById("setupArea").style.display = "block";
  document.getElementById("checkArea").style.display = "none";
  document.getElementById("hdrSub").textContent = "발주 목록을 붙여넣고 시작하세요";
}

function copyResult() {
  let lines = ["[검수 결과]"];
  let done=[], partial=[], none=[];
  for (let it of items) {
    if (it.got >= it.need) done.push(`✓ ${it.raw} (${it.got}/${it.need})`);
    else if (it.got > 0) partial.push(`◐ ${it.raw} (${it.got}/${it.need})`);
    else none.push(`✗ ${it.raw} (0/${it.need})`);
  }
  if (done.length) lines.push("", "■ 완료", ...done);
  if (partial.length) lines.push("", "■ 부족", ...partial);
  if (none.length) lines.push("", "■ 미수령", ...none);
  let wk = Object.keys(wrongScans);
  if (wk.length) { lines.push("", "■ 목록에 없는 스캔"); wk.forEach(k=>lines.push(`- ${k}: ${wrongScans[k]}회`)); }
  let text = lines.join("\n");
  navigator.clipboard?.writeText(text).then(
    ()=>alert("결과가 복사되었습니다."),
    ()=>{ prompt("아래 내용을 복사하세요:", text); }
  );
}
