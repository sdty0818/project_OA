<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>현장 부품 검수</title>
<style>
  :root {
    --green: #1d9e75; --green-bg: #e1f5ee;
    --amber: #ba7517; --amber-bg: #faeeda;
    --red: #e24b4a; --red-bg: #fcebeb;
    --gray: #5f5e5a; --gray-bg: #f1efe8;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --line: rgba(0,0,0,0.12);
    --txt: #2c2c2a; --txt2: #5f5e5a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    margin: 0; background: #fafafa; color: var(--txt);
    font-size: 16px; line-height: 1.5;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 0 14px 90px; }
  header {
    position: sticky; top: 0; z-index: 50; background: #fff;
    border-bottom: 1px solid var(--line); padding: 12px 14px;
    margin: 0 -14px 14px; text-align: center;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--txt2); margin-top: 2px; }

  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; margin-bottom: 12px;
  }
  .card h2 { font-size: 14px; margin: 0 0 10px; font-weight: 600; color: var(--txt2); }

  textarea {
    width: 100%; min-height: 110px; border: 1px solid var(--line);
    border-radius: 8px; padding: 10px; font-size: 15px; font-family: inherit;
    resize: vertical;
  }
  .hint { font-size: 12px; color: var(--txt2); margin: 6px 0 0; }

  button {
    border: none; border-radius: 10px; padding: 13px 16px; font-size: 16px;
    font-weight: 600; font-family: inherit; cursor: pointer; width: 100%;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-dark { background: #2c2c2a; color: #fff; }
  .btn-ghost { background: var(--gray-bg); color: var(--txt); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; }
  button:active { opacity: 0.85; }

  /* 진행 요약 */
  .summary { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 6px; text-align: center;
  }
  .stat .n { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .stat .l { font-size: 11px; color: var(--txt2); margin-top: 2px; }
  .stat.done .n { color: var(--green); }
  .stat.left .n { color: var(--amber); }
  .stat.wrong .n { color: var(--red); }

  /* 스캐너 */
  #scanArea { display: none; }
  #video {
    width: 100%; border-radius: 12px; background: #000;
    aspect-ratio: 3/4; object-fit: cover;
  }
  .scan-frame { position: relative; }
  .scan-line {
    position: absolute; left: 8%; right: 8%; height: 2px; background: var(--red);
    top: 50%; box-shadow: 0 0 8px var(--red); animation: scan 2s ease-in-out infinite;
  }
  @keyframes scan { 0%,100%{top:30%} 50%{top:70%} }
  .last-scan {
    text-align: center; padding: 10px; font-size: 14px; font-weight: 600;
    border-radius: 8px; margin-top: 10px; min-height: 20px;
  }

  /* 목록 */
  .item {
    display: flex; align-items: center; gap: 10px; padding: 12px 12px;
    border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px;
    background: #fff;
  }
  .item.s-done { background: var(--green-bg); border-color: var(--green); }
  .item.s-partial { background: var(--amber-bg); border-color: var(--amber); }
  .item .pn { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  .item .pn small { display: block; font-size: 11px; font-weight: 400; color: var(--txt2); letter-spacing: 0; margin-top: 1px; }
  .item .cnt {
    font-size: 15px; font-weight: 700; min-width: 56px; text-align: right;
  }
  .item.s-done .cnt { color: var(--green); }
  .item.s-partial .cnt { color: var(--amber); }
  .item .chk { font-size: 20px; min-width: 24px; text-align: center; }

  .manual-row { display: flex; gap: 8px; margin-top: 4px; }
  .manual-row input {
    flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 11px;
    font-size: 15px; font-family: inherit;
  }
  .manual-row button { width: auto; padding: 11px 16px; }

  /* 잘못 온 것 */
  .wrong-box { background: var(--red-bg); border-color: var(--red); }
  .wrong-box .wpn { font-weight: 600; color: var(--red); }

  .fab {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 28px); max-width: 492px; z-index: 60;
  }
  .empty { text-align: center; color: var(--txt2); font-size: 14px; padding: 20px 0; }
  .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--blue-bg); color:var(--blue); margin-left:6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>현장 부품 검수</h1>
    <div class="sub" id="hdrSub">발주 목록을 붙여넣고 시작하세요</div>
  </header>

  <!-- STEP 1: 목록 입력 -->
  <div id="setupArea">
    <div class="card">
      <h2>발주 목록 붙여넣기</h2>
      <textarea id="pasteInput" placeholder="예시 (한 줄에 하나씩):
35170 22600  3
87620 JIA0NCM  1
51750 2P000  2

※ 품번과 수량을 칸/탭으로 구분. 수량 없으면 1로 처리됩니다."></textarea>
      <p class="hint">엑셀·시트에서 품번/수량 두 칸을 복사해 붙여넣어도 됩니다.</p>
      <button class="btn-primary" style="margin-top:10px" onclick="loadList()">목록 불러오기</button>
    </div>
  </div>

  <!-- STEP 2: 검수 -->
  <div id="checkArea" style="display:none">
    <div class="summary">
      <div class="stat done"><div class="n" id="stDone">0</div><div class="l">완료</div></div>
      <div class="stat left"><div class="n" id="stLeft">0</div><div class="l">남음</div></div>
      <div class="stat wrong"><div class="n" id="stWrong">0</div><div class="l">잘못 옴</div></div>
    </div>

    <div class="card" id="scanCard">
      <div class="btn-row">
        <button class="btn-dark" id="scanToggle" onclick="toggleScan()">📷 바코드 스캔 시작</button>
      </div>
      <div id="scanArea">
        <div class="scan-frame" style="margin-top:10px">
          <video id="video" playsinline muted></video>
          <div class="scan-line"></div>
        </div>
        <div class="last-scan" id="lastScan">라벨 바코드를 비춰주세요</div>
      </div>
      <div class="manual-row">
        <input id="manualInput" placeholder="바코드 안 되면 품번 직접 입력" inputmode="text" autocomplete="off">
        <button class="btn-ghost" onclick="manualEnter()">확인</button>
      </div>
    </div>

    <div class="card">
      <h2>검수 목록</h2>
      <div id="itemList"></div>
    </div>

    <div id="wrongArea"></div>

    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn-ghost" onclick="resetAll()">처음부터</button>
      <button class="btn-ghost" onclick="copyResult()">결과 복사</button>
    </div>
  </div>
</div>

<script>
// ZXing 로딩 상태 추적 (CDN 실패 대비 다중 소스)
window.__zxingReady = false;
function loadZXing(srcs, idx) {
  idx = idx || 0;
  if (idx >= srcs.length) {
    window.__zxingFailed = true;
    var el = document.getElementById("lastScan");
    if (el) { el.textContent = "⚠️ 스캔 라이브러리를 불러오지 못했습니다. 네트워크 확인 후 새로고침하세요."; el.style.color="#e24b4a"; }
    return;
  }
  var s = document.createElement("script");
  s.src = srcs[idx];
  s.onload = function(){ window.__zxingReady = true; };
  s.onerror = function(){ loadZXing(srcs, idx+1); };
  document.head.appendChild(s);
}
loadZXing([
  "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js",
  "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/zxing-library/0.20.0/index.min.js"
]);
</script>
<script>
// ===== 상태 =====
let items = [];        // {raw, base, suffix, need, got}
let wrongScans = {};   // {scannedPn: count}
let codeReader = null;
let scanning = false;
let lastCode = "";
let lastTime = 0;

// ===== 품번 정규화 =====
// 바코드값/입력값에서 품번 추출: 공백 앞부분 + 대문자화 + 내부공백 제거
function normalizePart(raw) {
  if (!raw) return "";
  let s = String(raw).trim().toUpperCase();
  // 바코드는 "3517022600        0001" 처럼 공백 뒤 꼬리표가 붙음 → 첫 공백 덩어리 앞만
  // 단, 발주목록은 "35170 22600" 처럼 품번 중간 공백이 있을 수 있어 분리 처리
  return s;
}

// 비교용 키: 모든 공백 제거 + 대문자
function compareKey(raw) {
  return String(raw).toUpperCase().replace(/\s+/g, "");
}

// 바코드 원시값에서 품번부분만 분리 (꼬리표 제거)
// 규칙: 연속 2칸 이상 공백 또는 탭이 나오면 그 앞까지가 품번
function extractFromBarcode(raw) {
  let s = String(raw).trim();
  // 연속 공백(2개 이상)으로 분리되는 경우 앞부분만
  let m = s.split(/\s{2,}|\t+/);
  let head = m[0].trim();
  return head;
}

// 기본품번/접미사 분리: 영숫자 압축 후 앞 10자리=기본, 나머지=접미사
function splitBaseSuffix(key) {
  let k = key.replace(/[\s-]/g, "").toUpperCase();
  if (k.length <= 10) return { base: k, suffix: "" };
  return { base: k.slice(0, 10), suffix: k.slice(10) };
}

// ===== 목록 불러오기 =====
function loadList() {
  let txt = document.getElementById("pasteInput").value.trim();
  if (!txt) { alert("발주 목록을 붙여넣어 주세요."); return; }
  items = [];
  wrongScans = {};
  let lines = txt.split(/\r?\n/);
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    // 끝에 붙은 수량(숫자) 분리: 마지막 토큰이 순수 숫자면 수량
    let parts = line.split(/[\t]+|\s{2,}/).map(s=>s.trim()).filter(Boolean);
    let qty = 1, pn = line;
    if (parts.length >= 2 && /^\d+$/.test(parts[parts.length-1])) {
      qty = parseInt(parts[parts.length-1], 10);
      pn = parts.slice(0, -1).join(" ");
    } else {
      // 단일칸 구분 시도: 마지막 토큰이 숫자면 수량
      let sp = line.split(/\s+/);
      if (sp.length >= 2 && /^\d+$/.test(sp[sp.length-1]) && sp[sp.length-1].length <= 3) {
        qty = parseInt(sp[sp.length-1], 10);
        pn = sp.slice(0, -1).join(" ");
      }
    }
    let key = compareKey(pn);
    if (!key) continue;
    let bs = splitBaseSuffix(key);
    items.push({ raw: pn.trim(), key: key, base: bs.base, suffix: bs.suffix, need: qty, got: 0 });
  }
  if (items.length === 0) { alert("인식된 품번이 없습니다. 형식을 확인해주세요."); return; }
  document.getElementById("setupArea").style.display = "none";
  document.getElementById("checkArea").style.display = "block";
  document.getElementById("hdrSub").textContent = `${items.length}개 품목 검수 중`;
  render();
}

// ===== 스캔 처리 =====
function handleScan(rawValue) {
  let now = Date.now();
  // 중복 방지: 같은 코드 1.5초 내 무시
  if (rawValue === lastCode && now - lastTime < 1500) return;
  lastCode = rawValue; lastTime = now;

  let head = extractFromBarcode(rawValue);
  let scanKey = compareKey(head);
  let bs = splitBaseSuffix(scanKey);

  // 매칭 우선순위:
  // (1) 기본품번+접미사 완전일치  (2) DS만 차이나는 경우(예외 통과)
  // (3) 그 외 접미사 차이 → 확인필요(노랑)  (4) 없음 → 잘못옴(빨강)
  let exact = null, dsPass = null, suffixDiff = null;
  for (let it of items) {
    if (it.base !== bs.base) continue;
    if (it.suffix === bs.suffix) { exact = it; break; }
    // DS 예외: 발주와 라벨의 차이가 'DS 유무'뿐일 때만 통과
    // (한쪽 접미사가 DS, 다른쪽이 빈칸) 또는 (한쪽 DS, 다른쪽도 DS는 위에서 처리됨)
    let pair = [it.suffix, bs.suffix].sort().join("|");
    if (pair === "|DS") { if (!dsPass) dsPass = it; continue; }
    // 그 외 접미사 차이 (AS, B, 색상코드 등) → 확인 필요 후보
    if (!suffixDiff) suffixDiff = it;
  }

  let matched = exact || dsPass;

  if (matched) {
    if (matched.got < matched.need) {
      matched.got++;
      let tag = (matched === dsPass) ? "  (DS 예외 통과)" : "";
      flash(`✅ ${matched.raw}${tag}  (${matched.got}/${matched.need})`, "var(--green)", "var(--green-bg)");
      beep(true);
    } else {
      flash(`⚠️ ${matched.raw}  이미 수량 다 채움 (${matched.need}개)`, "var(--amber)", "var(--amber-bg)");
      beep(false);
    }
  } else if (suffixDiff) {
    // 기본품번은 같지만 접미사가 DS 외로 다름 → 사람이 확인
    let wk = "확인필요: " + head + " (발주 " + suffixDiff.raw + ")";
    wrongScans[wk] = (wrongScans[wk]||0) + 1;
    flash(`⚠️ 접미사 다름 — 확인 필요\n라벨 ${head} / 발주 ${suffixDiff.raw}`, "var(--amber)", "var(--amber-bg)");
    beep(false);
  } else {
    let wk = bs.base + (bs.suffix||"");
    wrongScans[wk] = (wrongScans[wk]||0) + 1;
    flash(`❌ 목록에 없음: ${head}`, "var(--red)", "var(--red-bg)");
    beep(false);
  }
  render();
}

function flash(msg, color, bg) {
  let el = document.getElementById("lastScan");
  el.textContent = msg;
  el.style.color = color;
  el.style.background = bg;
}

// 간단한 비프음 (Web Audio)
let audioCtx = null;
function beep(ok) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = ok ? 880 : 300;
    g.gain.value = 0.15;
    o.start();
    setTimeout(()=>{ o.stop(); }, ok ? 90 : 180);
  } catch(e){}
}

// ===== 수동 입력 =====
function manualEnter() {
  let v = document.getElementById("manualInput").value.trim();
  if (!v) return;
  handleScan(v);
  document.getElementById("manualInput").value = "";
}
document.getElementById("manualInput")?.addEventListener("keydown", e=>{
  if (e.key === "Enter") manualEnter();
});

// ===== 카메라 스캔 =====
async function toggleScan() {
  if (scanning) { stopScan(); return; }

  // 라이브러리 준비 확인
  if (window.__zxingFailed || typeof ZXing === "undefined") {
    flash("스캔 라이브러리 로딩 실패 — 새로고침하거나 직접 입력을 쓰세요.", "var(--red)", "var(--red-bg)");
    return;
  }

  document.getElementById("scanArea").style.display = "block";
  document.getElementById("scanToggle").textContent = "■ 스캔 중지";
  scanning = true;
  flash("카메라 권한을 확인하는 중…", "var(--blue)", "var(--blue-bg)");

  // 1단계: 권한을 명시적으로 먼저 요청 (팝업 확실히 띄우기)
  let stream = null;

  // 진단: mediaDevices 자체가 있는지 먼저 확인
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    scanning = false;
    document.getElementById("scanArea").style.display = "none";
    document.getElementById("scanToggle").textContent = "📷 바코드 스캔 시작";
    let secure = window.isSecureContext ? "보안컨텍스트 OK" : "비보안(주소 확인필요)";
    flash("이 브라우저에 카메라 API가 없습니다. (" + secure + ") / 주소: " + location.protocol, "var(--red)", "var(--red-bg)");
    return;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }, audio: false
    });
  } catch (e) {
    // 후면 카메라 지정이 실패하는 기기가 있어, 제약 없이 한 번 더 시도
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch (e2) {
      scanning = false;
      document.getElementById("scanArea").style.display = "none";
      document.getElementById("scanToggle").textContent = "📷 바코드 스캔 시작";
      // 실제 에러 이름과 메시지를 그대로 노출 (진단용)
      let nm = (e2 && e2.name) ? e2.name : "Unknown";
      let mg = (e2 && e2.message) ? e2.message : String(e2);
      flash("카메라 오류 [" + nm + "] " + mg, "var(--red)", "var(--red-bg)");
      return;
    }
  }

  // 2단계: 권한 받았으면 비디오에 직접 연결 + ZXing 디코딩
  try {
    let video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    flash("라벨 바코드를 비춰주세요", "var(--txt2)", "transparent");

    codeReader = new ZXing.BrowserMultiFormatReader();
    // 이미 열린 stream의 video에서 디코딩
    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (result) handleScan(result.getText());
    });
  } catch (e) {
    flash("스캔 시작 중 오류: " + (e && e.message ? e.message : e), "var(--red)", "var(--red-bg)");
  }
}
function stopScan() {
  scanning = false;
  if (codeReader) { try { codeReader.reset(); } catch(e){} }
  let video = document.getElementById("video");
  if (video && video.srcObject) {
    try { video.srcObject.getTracks().forEach(t=>t.stop()); } catch(e){}
    video.srcObject = null;
  }
  document.getElementById("scanArea").style.display = "none";
  document.getElementById("scanToggle").textContent = "📷 바코드 스캔 시작";
}

// ===== 렌더링 =====
function render() {
  let done = 0, left = 0, wrong = 0;
  let html = "";
  for (let it of items) {
    let cls = "", chk = "○";
    if (it.got >= it.need) { cls = "s-done"; chk = "✓"; done++; }
    else if (it.got > 0) { cls = "s-partial"; chk = "◐"; left += (it.need - it.got); }
    else { left += it.need; }
    let suf = it.suffix ? `<small>접미사 ${it.suffix}</small>` : "";
    html += `<div class="item ${cls}">
      <div class="chk">${chk}</div>
      <div class="pn">${it.raw}${suf}</div>
      <div class="cnt">${it.got} / ${it.need}</div>
    </div>`;
  }
  document.getElementById("itemList").innerHTML = html || '<div class="empty">품목 없음</div>';

  // 잘못 온 것
  let wkeys = Object.keys(wrongScans);
  let wrongHtml = "";
  if (wkeys.length) {
    wrongHtml = '<div class="card wrong-box"><h2 style="color:var(--red)">⚠️ 목록에 없는 스캔</h2>';
    for (let k of wkeys) {
      wrong += wrongScans[k];
      wrongHtml += `<div class="item wrong-box" style="margin-bottom:6px">
        <div class="wpn">${k}</div>
        <div class="cnt" style="color:var(--red)">${wrongScans[k]}회</div>
        <button class="btn-ghost" style="width:auto;padding:8px 12px;font-size:13px" onclick="clearWrong('${k}')">지움</button>
      </div>`;
    }
    wrongHtml += '</div>';
  }
  document.getElementById("wrongArea").innerHTML = wrongHtml;

  document.getElementById("stDone").textContent = done;
  document.getElementById("stLeft").textContent = left;
  document.getElementById("stWrong").textContent = wrong;
}

function clearWrong(k) { delete wrongScans[k]; render(); }

function resetAll() {
  if (!confirm("처음부터 다시 시작할까요? 현재 검수 기록이 지워집니다.")) return;
  stopScan();
  items = []; wrongScans = {}; lastCode = "";
  document.getElementById("setupArea").style.display = "block";
  document.getElementById("checkArea").style.display = "none";
  document.getElementById("hdrSub").textContent = "발주 목록을 붙여넣고 시작하세요";
}

function copyResult() {
  let lines = ["[검수 결과]"];
  let done=[], partial=[], none=[];
  for (let it of items) {
    if (it.got >= it.need) done.push(`✓ ${it.raw} (${it.got}/${it.need})`);
    else if (it.got > 0) partial.push(`◐ ${it.raw} (${it.got}/${it.need})`);
    else none.push(`✗ ${it.raw} (0/${it.need})`);
  }
  if (done.length) lines.push("", "■ 완료", ...done);
  if (partial.length) lines.push("", "■ 부족", ...partial);
  if (none.length) lines.push("", "■ 미수령", ...none);
  let wk = Object.keys(wrongScans);
  if (wk.length) { lines.push("", "■ 목록에 없는 스캔"); wk.forEach(k=>lines.push(`- ${k}: ${wrongScans[k]}회`)); }
  let text = lines.join("\n");
  navigator.clipboard?.writeText(text).then(
    ()=>alert("결과가 복사되었습니다."),
    ()=>{ prompt("아래 내용을 복사하세요:", text); }
  );
}
</script>
